<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เครื่องคิดราคาเครื่องหมาย</title>
<style>
  :root{
    --bg:#f7f5f2;
    --card:#ffffff;
    --border:#e0ddd6;
    --text:#2c2c2a;
    --text-secondary:#6b6b66;
    --text-muted:#9a9a94;
    --accent:#9c2b2b;
    --accent-text:#ffffff;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    padding:24px 16px 60px;
    background:var(--bg);
    color:var(--text);
    font-family:"Segoe UI","Tahoma","Leelawadee UI","Noto Sans Thai",sans-serif;
  }
  .container{max-width:820px;margin:0 auto;}
  h1{font-size:18px;font-weight:600;margin:0 0 20px;text-align:center;}
  .field{margin-bottom:20px;}
  label{display:block;font-size:13px;color:var(--text-secondary);margin-bottom:6px;}
  input[type="text"], input[type="number"]{
    width:100%;
    padding:10px 12px;
    border:1px solid var(--border);
    border-radius:var(--radius);
    background:var(--card);
    color:var(--text);
    font-size:15px;
    font-family:inherit;
  }
  input[type="text"]:focus, input[type="number"]:focus{
    outline:none;border-color:var(--accent);
  }
  select.branch-select{
    width:100%;
    padding:10px 12px;
    border:1px solid var(--border);
    border-radius:var(--radius);
    background:var(--card);
    color:var(--text);
    font-size:15px;
    font-family:inherit;
  }
  select.branch-select:focus{outline:none;border-color:var(--accent);}
  .catalog{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;align-items:stretch;}
  .side{display:flex;flex-direction:column;justify-content:flex-end;}
  @media (max-width:640px){
    .catalog{grid-template-columns:1fr;}
    .side{justify-content:flex-start;}
  }
  .medal-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px;}
  .list-col{display:flex;flex-direction:column;gap:10px;margin-bottom:12px;}
  .card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:12px;
    padding:10px;
  }
  .item-image{
    width:100%;
    height:70px;
    border-radius:8px;
    background:var(--bg);
    border:1px dashed var(--border);
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    margin-bottom:6px;
    cursor:pointer;
  }
  .item-image img{width:100%;height:100%;object-fit:cover;display:block;}
  .placeholder-text{font-size:11px;color:var(--text-muted);}
  .rank-select{position:relative;margin-bottom:8px;}
  .rank-select-btn{
    width:100%;display:flex;align-items:center;justify-content:space-between;gap:8px;
    padding:10px 12px;border:1px solid var(--border);border-radius:8px;
    background:var(--bg);font-size:14px;color:var(--text);cursor:pointer;font-family:inherit;
  }
  .rank-select-btn .placeholder{color:var(--text-muted);}
  .rank-select-caret{font-size:11px;color:var(--text-secondary);flex-shrink:0;}
  .rank-select-panel{
    position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:20;
    background:var(--card);border:1px solid var(--border);border-radius:8px;
    box-shadow:0 4px 14px rgba(0,0,0,0.15);padding:6px;
  }
  .rank-select-panel[hidden]{display:none;}
  .rank-option{
    display:flex;align-items:center;gap:8px;padding:8px;border-radius:6px;
    cursor:pointer;font-size:14px;
  }
  .rank-option:hover{background:var(--bg);}
  .rank-option .check{width:16px;color:var(--accent);font-size:13px;flex-shrink:0;}
  .rank-option.has-image{flex-direction:column;align-items:stretch;gap:6px;}
  .rank-option-thumb{width:100%;height:auto;max-height:180px;border-radius:6px;object-fit:contain;background:var(--bg);flex-shrink:0;}
  .rank-option-label{display:flex;align-items:center;gap:6px;}
  .rank-empty{padding:8px;font-size:12px;color:var(--text-muted);}
  .rank-select-add{
    display:flex;flex-wrap:wrap;gap:6px;padding:8px 4px 4px;border-top:1px solid var(--border);margin-top:4px;
  }
  .rank-select-add input[type="text"]{flex:1;min-width:80px;font-size:12px;padding:6px 8px;}
  .rank-select-add button{
    font-size:11px;padding:6px 8px;border-radius:6px;border:1px solid var(--border);
    background:var(--card);cursor:pointer;font-family:inherit;white-space:nowrap;
  }
  .image-btns{display:flex;gap:6px;margin-bottom:8px;}
  .image-btns button{
    flex:1;font-size:11px;padding:6px 4px;border-radius:6px;
    border:1px solid var(--border);background:var(--card);cursor:pointer;
    font-family:inherit;color:var(--text-secondary);
  }
  .image-btns button:active{transform:scale(0.97);}
  .nameplate-preview{
    background:linear-gradient(180deg,#1c1c1c,#000000);
    border:2px solid #c9c9c9;
    border-radius:4px;
    padding:16px 8px;
    text-align:center;
    color:#f4f4f4;
    font-weight:600;
    font-size:13px;
    letter-spacing:0.3px;
    min-height:50px;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-bottom:8px;
    word-break:break-word;
  }
  .card .name-row{display:flex;align-items:center;gap:4px;margin-bottom:6px;}
  .card .name-row input{border:none;padding:2px 0;font-size:14px;font-weight:500;background:transparent;min-width:0;}
  .card .price-row{display:flex;align-items:center;gap:6px;margin-bottom:8px;}
  .card .price-row span{font-size:13px;color:var(--text-secondary);}
  .card .price-row input{padding:6px 8px;font-size:13px;}
  .card .qty-row{display:flex;align-items:center;justify-content:space-between;}
  .qty-controls{display:flex;align-items:center;gap:8px;}
  .qty-btn{
    width:32px;height:32px;border-radius:8px;border:1px solid var(--border);
    background:var(--card);font-size:16px;cursor:pointer;line-height:1;
  }
  .qty-btn:active{transform:scale(0.96);}
  .qty-val{font-size:14px;min-width:18px;text-align:center;}
  .subtotal{font-size:13px;color:var(--text-secondary);}
  .remove-btn{
    border:none;background:transparent;cursor:pointer;color:var(--text-muted);
    font-size:16px;padding:2px 6px;margin-left:auto;flex-shrink:0;
  }
  /* compact 3-across medal cards */
  .medal-row .card{padding:8px;}
  .medal-row .item-image{height:46px;}
  .medal-row .image-btns button{font-size:9px;padding:4px 2px;}
  .medal-row .name-row input{font-size:13px;}
  .medal-row .price-row input{font-size:12px;padding:5px 6px;}
  .medal-row .qty-row{flex-direction:column;align-items:stretch;gap:6px;}
  .medal-row .qty-btn{width:28px;height:28px;font-size:14px;}
  .medal-row .subtotal{text-align:right;}
  .btn{
    padding:12px 16px;border-radius:var(--radius);border:1px solid var(--border);
    background:var(--card);color:var(--text);font-size:14px;cursor:pointer;
    font-family:inherit;
  }
  .btn:active{transform:scale(0.98);}
  .btn.full{width:100%;}
  .btn.primary{background:var(--accent);color:var(--accent-text);border:none;flex:1;}
  .btn.secondary{flex:1;}
  .actions{display:flex;gap:10px;}
  .receipt{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:12px;
    padding:18px;
    margin-bottom:16px;
  }
  .receipt-title{font-size:15px;font-weight:600;margin:0 0 2px;}
  .receipt-sub{font-size:13px;color:var(--text-secondary);margin:0 0 14px;}
  .receipt-items{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;min-height:20px;}
  .receipt-item-row{display:flex;justify-content:space-between;font-size:14px;}
  .receipt-empty{font-size:13px;color:var(--text-muted);}
  .receipt-total-row{
    border-top:1px solid var(--border);padding-top:12px;
    display:flex;justify-content:space-between;align-items:center;
  }
  .receipt-total-row span:first-child{font-size:13px;color:var(--text-secondary);}
  .receipt-total-row span:last-child{font-size:20px;font-weight:600;color:var(--accent);}
  .hint{font-size:12px;color:var(--text-muted);text-align:center;margin:-8px 0 20px;}
</style>
</head>
<body>
<div class="container">
  <div class="field">
    <label>เลือกเหล่า</label>
    <select id="branchSelect" class="branch-select">
      <option value="navy">ทหารเรือ</option>
      <option value="army">ทหารบก</option>
      <option value="police">ตำรวจ</option>
      <option value="airforce">ทหารอากาศ</option>
    </select>
  </div>

  <h1>เครื่องคิดราคาเครื่องหมาย</h1>

  <div class="field">
    <label>ชื่อลูกค้า</label>
    <input type="text" id="customerName" placeholder="พิมพ์ชื่อลูกค้า">
  </div>
  <p class="hint">ป้ายชื่อจะขึ้นชื่อลูกค้าอัตโนมัติในกรอบดำด้านล่าง ไม่ต้องอัปโหลดรูป</p>

  <div class="catalog">
    <div class="side">
      <div id="medalTopRow" class="medal-row"></div>
      <div id="medalRow" class="medal-row"></div>
      <div id="leftList" class="list-col"></div>
      <button id="addBtnLeft" class="btn full">+ เพิ่มรายการ</button>
    </div>
    <div class="side">
      <div id="rightList" class="list-col"></div>
      <button id="addBtnRight" class="btn full">+ เพิ่มรายการ</button>
    </div>
  </div>

  <div id="receipt" class="receipt">
    <p class="receipt-title">ใบสั่งผลิต</p>
    <p id="receiptName" class="receipt-sub">ลูกค้า: -</p>
    <div id="receiptItems" class="receipt-items"></div>
    <div class="receipt-total-row">
      <span>ยอดรวม</span>
      <span id="total">0 บาท</span>
    </div>
  </div>

  <div class="actions">
    <button id="clearBtn" class="btn secondary">ล้างรายการ</button>
    <button id="saveBtn" class="btn primary">บันทึกภาพ</button>
  </div>
</div>

function rankGroup(name, price, options){ return {name: name, price: price, options: options}; }

function makeBranchItems(prefix, includeMarksman){
  const list = [
    {id:prefix+'-i0', name:'เหรียญ วปร.', price:154, qty:0, side:'left', group:'medal-top', image:'medal-king.jpg'},
    {id:prefix+'-i1', name:'เหรียญราชินี', price:193, qty:0, side:'left', group:'medal', image:'medal-queen.jpg'},
    {id:prefix+'-i2', name:'เหรียญบรม', price:176, qty:0, side:'left', group:'medal', image:'medal-borom.jpg'},
    {id:prefix+'-i3', name:'เหรียญ 72', price:200, qty:0, side:'left', group:'medal', image:'medal-72.jpg'}
  ];
  if(includeMarksman){
    list.push({id:prefix+'-i14', name:'เหรียญ นรต.', price:200, qty:0, side:'left', group:null, image:'medal-nrt.png'});
    list.push({id:prefix+'-i4', name:'เหรียญแม่นปืนตำรวจ', price:200, qty:0, side:'left', group:null, image:'medal-maskman-police.png'});
    list.push({id:prefix+'-i15', name:'อรินทราช', price:200, qty:0, side:'left', group:null, image:'arintaraj.png'});
  }
  list.push(
    {id:prefix+'-i6', name:'ป้ายชื่อ', price:150, qty:0, side:'left', group:null, image:null, nameTag:true},
    {id:prefix+'-i10', name:'แถว', price:225, qty:0, side:'left', group:null, image:null}
  );
  if(includeMarksman){
    list.push({id:prefix+'-i16', name:'ร่มตำรวจ', price:300, qty:0, side:'right', group:null, image:'parachute-police.png'});
  }
  list.push(
    {id:prefix+'-i9', name:'แพรแถบ', price:0, qty:0, side:'right', group:null, image:null, rankSelect:true, rankGroupIdx:null, rankLabel:null, rankGroups: buildRibbonRankGroups()},
    {id:prefix+'-i11', name:'แถว', price:225, qty:0, side:'right', group:null, image:null}
  );
  return list;
}

const branchStore = {
  navy: {items: makeNavyItems(), counter: 17, customerName: ''},
  army: {items: makeBranchItems('army'), counter: 100, customerName: ''},
  police: {items: makeBranchItems('police', true), counter: 100, customerName: ''},
  airforce: {items: makeBranchItems('airforce'), counter: 100, customerName: ''}
};

let currentBranch = 'navy';
let items = branchStore[currentBranch].items;
let counter = branchStore[currentBranch].counter;

    if(Array.isArray(saved)) return saved;
  }catch(e){}

}
function saveRankOptions(it, groupIdx, options){

}

const medalTopRow = document.getElementById('medalTopRow');
const medalRow = document.getElementById('medalRow');
const leftList = document.getElementById('leftList');
const rightList = document.getElementById('rightList');
const totalEl = document.getElementById('total');
const customerNameInput = document.getElementById('customerName');
const receiptName = document.getElementById('receiptName');
const receiptItems = document.getElementById('receiptItems');
const branchSelect = document.getElementById('branchSelect');

function switchBranch(nextBranch){
  if(nextBranch === currentBranch || !branchStore[nextBranch]) return;
  branchStore[currentBranch].items = items;
  branchStore[currentBranch].counter = counter;
  branchStore[currentBranch].customerName = customerNameInput.value;
  currentBranch = nextBranch;
  items = branchStore[currentBranch].items;
  counter = branchStore[currentBranch].counter;
  customerNameInput.value = branchStore[currentBranch].customerName;
  renderAll();
}

branchSelect.addEventListener('change', () => switchBranch(branchSelect.value));

function fmt(n){ return Math.round(n).toLocaleString('th-TH'); }

function computeTotal(){
  let sum = 0;
  items.forEach(it => sum += (Number(it.price)||0) * it.qty);
  return sum;
}

function renderReceipt(){
  const nameVal = customerNameInput.value.trim() || '-';
  receiptName.textContent = 'ลูกค้า: ' + nameVal;
  const selected = items.filter(it => it.qty > 0);
  if(selected.length === 0){
    receiptItems.innerHTML = '<p class="receipt-empty">ยังไม่ได้เลือกสินค้า</p>';
  } else {
    receiptItems.innerHTML = selected.map(it =>
      '<div class="receipt-item-row"><span>' + it.name + ' × ' + it.qty + '</span><span>' + fmt(it.price*it.qty) + '</span></div>'
    ).join('');
  }
  totalEl.textContent = fmt(computeTotal()) + ' บาท';
}

function updateNamePlates(){
  const nameVal = customerNameInput.value.trim() || 'ชื่อลูกค้า';
  document.querySelectorAll('[data-role="nameplate"]').forEach(el => {
    el.textContent = nameVal;
  });
}

document.addEventListener('click', (e) => {
  document.querySelectorAll('.rank-select-panel:not([hidden])').forEach(panel => {
    const wrap = panel.closest('.rank-select');
    if(wrap && !wrap.contains(e.target)) panel.hidden = true;
  });
});

function cardTemplate(it){
  const card = document.createElement('div');
  card.className = 'card';

  let visualHtml;
  if(it.nameTag){
    const nameVal = customerNameInput.value.trim() || 'ชื่อลูกค้า';
    visualHtml = '<div class="nameplate-preview" data-role="nameplate">' + nameVal + '</div>';
  } else if(it.rankSelect){
    const groupSelected = it.rankGroupIdx != null;
    const groupName = groupSelected ? it.rankGroups[it.rankGroupIdx].name : 'เลือกกลุ่มยศ';
    visualHtml =
      '<div class="item-image" data-role="imageArea">' +
        (it.image ? '<img src="' + it.image + '" alt="">' : '<span class="placeholder-text">ยังไม่มีรูป</span>') +
      '</div>' +
      '<div class="rank-select" data-role="rankGroupSelect">' +
        '<button type="button" class="rank-select-btn" data-role="rankGroupBtn">' +
          '<span data-role="rankGroupLabel"' + (groupSelected ? '' : ' class="placeholder"') + '>' + groupName + '</span>' +
          '<span class="rank-select-caret">▾</span>' +
        '</button>' +
        '<div class="rank-select-panel" data-role="rankGroupPanel" hidden></div>' +
      '</div>' +
      '<div class="rank-select" data-role="rankSelect">' +
        '<button type="button" class="rank-select-btn" data-role="rankSelectBtn">' +
          '<span data-role="rankSelectLabel"' + (it.rankLabel ? '' : ' class="placeholder"') + '>' + (it.rankLabel || 'เลือกยศ') + '</span>' +
          '<span class="rank-select-caret">▾</span>' +
        '</button>' +
        '<div class="rank-select-panel" data-role="rankSelectPanel" hidden></div>' +
      '</div>' +
      '<input type="file" accept="image/*" data-role="newRankFile" style="display:none">';
  } else {
    visualHtml =
      '<div class="item-image" data-role="imageArea">' +
        (it.image ? '<img src="' + it.image + '" alt="">' : '<span class="placeholder-text">ยังไม่มีรูป</span>') +
      '</div>' +
      '<div class="image-btns">' +
        '<button type="button" data-role="chooseImg">เลือกรูป</button>' +
        '<button type="button" data-role="takePhoto">ถ่ายภาพ</button>' +
      '</div>' +
      '<input type="file" accept="image/*" data-role="fileGallery" style="display:none">' +
      '<input type="file" accept="image/*" capture="environment" data-role="fileCamera" style="display:none">';
  }

  card.innerHTML = visualHtml +
    '<div class="name-row">' +
      '<input type="text" value="' + it.name + '" data-role="name">' +
      '<button class="remove-btn" data-role="remove" aria-label="ลบรายการ">×</button>' +
    '</div>' +
    '<div class="price-row">' +
      '<span>฿</span>' +
      '<input type="number" value="' + it.price + '" min="0" step="1" data-role="price">' +
    '</div>' +
    '<div class="qty-row">' +
      '<div class="qty-controls">' +
        '<button class="qty-btn" data-role="minus" aria-label="ลด">-</button>' +
        '<span class="qty-val" data-role="qty">' + it.qty + '</span>' +
        '<button class="qty-btn" data-role="plus" aria-label="เพิ่ม">+</button>' +
      '</div>' +
      '<span class="subtotal" data-role="subtotal">' + fmt(it.price*it.qty) + '</span>' +
    '</div>';

  const nameInput = card.querySelector('[data-role="name"]');
  const priceInput = card.querySelector('[data-role="price"]');
  const qtySpan = card.querySelector('[data-role="qty"]');
  const subtotalSpan = card.querySelector('[data-role="subtotal"]');
  const minusBtn = card.querySelector('[data-role="minus"]');
  const plusBtn = card.querySelector('[data-role="plus"]');
  const removeBtn = card.querySelector('[data-role="remove"]');

  nameInput.addEventListener('input', () => { it.name = nameInput.value; renderReceipt(); });
  priceInput.addEventListener('input', () => {
    it.price = Number(priceInput.value) || 0;
    subtotalSpan.textContent = fmt(it.price * it.qty);
    renderReceipt();
  });
  minusBtn.addEventListener('click', () => {
    it.qty = Math.max(0, it.qty - 1);
    qtySpan.textContent = it.qty;
    subtotalSpan.textContent = fmt(it.price * it.qty);
    renderReceipt();
  });
  plusBtn.addEventListener('click', () => {
    it.qty += 1;
    qtySpan.textContent = it.qty;
    subtotalSpan.textContent = fmt(it.price * it.qty);
    renderReceipt();
  });
  removeBtn.addEventListener('click', () => {
    items = items.filter(x => x.id !== it.id);
    card.remove();
    renderReceipt();
  });

  if(it.rankSelect){
    const imageArea = card.querySelector('[data-role="imageArea"]');
    const groupBtn = card.querySelector('[data-role="rankGroupBtn"]');
    const groupLabel = card.querySelector('[data-role="rankGroupLabel"]');
    const groupPanel = card.querySelector('[data-role="rankGroupPanel"]');
    const selectBtn = card.querySelector('[data-role="rankSelectBtn"]');
    const selectLabel = card.querySelector('[data-role="rankSelectLabel"]');
    const panel = card.querySelector('[data-role="rankSelectPanel"]');
    const newRankFile = card.querySelector('[data-role="newRankFile"]');
    let pendingName = '';
    let currentOptions = it.rankGroupIdx != null ? loadRankOptions(it, it.rankGroupIdx) : [];

    function updateGroupLabel(){
      const g = it.rankGroupIdx != null ? it.rankGroups[it.rankGroupIdx] : null;
      groupLabel.textContent = g ? g.name : 'เลือกกลุ่มยศ';
      groupLabel.classList.toggle('placeholder', !g);
    }

    function updateSelectLabel(){
      selectLabel.textContent = it.rankLabel || 'เลือกยศ';
      selectLabel.classList.toggle('placeholder', !it.rankLabel);
    }

    function selectGroup(idx){
      it.rankGroupIdx = idx;
      it.rankLabel = null;
      it.image = null;
      const group = it.rankGroups[idx];
      it.price = group.price;
      priceInput.value = group.price;
      subtotalSpan.textContent = fmt(it.price * it.qty);
      currentOptions = loadRankOptions(it, idx);
      imageArea.innerHTML = '<span class="placeholder-text">ยังไม่มีรูป</span>';
      updateGroupLabel();
      updateSelectLabel();
      groupPanel.hidden = true;
      renderReceipt();
    }

    function selectRank(opt){
      it.rankLabel = opt.name;
      it.image = opt.image;
      imageArea.innerHTML = it.image ? '<img src="' + it.image + '" alt="">' : '<span class="placeholder-text">ยังไม่มีรูป</span>';
      updateSelectLabel();
      panel.hidden = true;
    }

    function renderGroupPanel(){
      groupPanel.innerHTML = it.rankGroups.map((g, idx) =>
        '<div class="rank-option" data-idx="' + idx + '">' +
          '<span class="check">' + (it.rankGroupIdx === idx ? '✓' : '') + '</span>' +
          '<span>' + g.name + '</span>' +
        '</div>'
      ).join('');
      groupPanel.querySelectorAll('.rank-option').forEach(row => {
        row.addEventListener('click', () => selectGroup(Number(row.dataset.idx)));
      });
    }

    function renderPanel(){
      if(it.rankGroupIdx == null){
        panel.innerHTML = '<div class="rank-empty">เลือกกลุ่มยศก่อน</div>';
        return;
      }
      const optionsHtml = currentOptions.length
        ? currentOptions.map((opt, idx) =>
            '<div class="rank-option' + (opt.image ? ' has-image' : '') + '" data-idx="' + idx + '">' +
              (opt.image ? '<img class="rank-option-thumb" src="' + opt.image + '" alt="">' : '') +
              '<div class="rank-option-label">' +
                '<span class="check">' + (it.rankLabel === opt.name ? '✓' : '') + '</span>' +
                '<span>' + opt.name + '</span>' +
              '</div>' +
            '</div>'
          ).join('')
        : '<div class="rank-empty">ยังไม่มีตัวเลือก</div>';

      panel.innerHTML = optionsHtml +
        '<div class="rank-select-add">' +
          '<input type="text" placeholder="ชื่อยศใหม่" data-role="newRankName" value="' + pendingName.replace(/"/g,'&quot;') + '">' +
          '<button type="button" data-role="newRankImageBtn">+ เพิ่มยศ</button>' +
        '</div>';

      panel.querySelectorAll('.rank-option').forEach(row => {
        row.addEventListener('click', () => selectRank(currentOptions[Number(row.dataset.idx)]));
      });
      const nameInput = panel.querySelector('[data-role="newRankName"]');
      nameInput.addEventListener('input', () => { pendingName = nameInput.value; });
      panel.querySelector('[data-role="newRankImageBtn"]').addEventListener('click', () => {
        if(!nameInput.value.trim()){
          nameInput.focus();
          return;
        }
        pendingName = nameInput.value.trim();
        newRankFile.click();
      });
    }

    groupBtn.addEventListener('click', () => {
      if(groupPanel.hidden){ renderGroupPanel(); groupPanel.hidden = false; }
      else{ groupPanel.hidden = true; }
    });

    selectBtn.addEventListener('click', () => {
      if(panel.hidden){ renderPanel(); panel.hidden = false; }
      else{ panel.hidden = true; }
    });

    newRankFile.addEventListener('change', () => {
      if(it.rankGroupIdx == null) return;
      const file = newRankFile.files && newRankFile.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = function(e){
        const opt = {name: pendingName, image: e.target.result};
        currentOptions.push(opt);
        saveRankOptions(it, it.rankGroupIdx, currentOptions);
        pendingName = '';
        selectRank(opt);
      };
      reader.readAsDataURL(file);
      newRankFile.value = '';
    });

    updateGroupLabel();
    updateSelectLabel();
  } else if(!it.nameTag){
    const imageArea = card.querySelector('[data-role="imageArea"]');
    const chooseBtn = card.querySelector('[data-role="chooseImg"]');
    const takeBtn = card.querySelector('[data-role="takePhoto"]');
    const fileGallery = card.querySelector('[data-role="fileGallery"]');
    const fileCamera = card.querySelector('[data-role="fileCamera"]');

    function handleFile(inputEl){
      const file = inputEl.files && inputEl.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = function(e){
        it.image = e.target.result;
        imageArea.innerHTML = '<img src="' + it.image + '" alt="">';
      };
      reader.readAsDataURL(file);
    }

    chooseBtn.addEventListener('click', () => fileGallery.click());
    takeBtn.addEventListener('click', () => fileCamera.click());
    fileGallery.addEventListener('change', () => handleFile(fileGallery));
    fileCamera.addEventListener('change', () => handleFile(fileCamera));
    imageArea.addEventListener('click', () => fileGallery.click());
  }

  return card;
}

function renderAll(){
  medalTopRow.innerHTML = '';
  medalRow.innerHTML = '';
  leftList.innerHTML = '';
  rightList.innerHTML = '';
  items.forEach(it => {
    if(it.group === 'medal-top'){
      const card = cardTemplate(it);
      card.style.gridColumn = '2';
      medalTopRow.appendChild(card);
    } else if(it.group === 'medal'){
      medalRow.appendChild(cardTemplate(it));
    } else if(it.side === 'right'){
      rightList.appendChild(cardTemplate(it));
    } else {
      leftList.appendChild(cardTemplate(it));
    }
  });
  renderReceipt();
  updateNamePlates();
}

document.getElementById('addBtnLeft').addEventListener('click', () => {
  const newItem = {id:'i'+counter, name:'รายการใหม่', price:0, qty:0, side:'left', group:null, image:null};
  counter++;
  items.push(newItem);
  leftList.appendChild(cardTemplate(newItem));
  renderReceipt();
});

document.getElementById('addBtnRight').addEventListener('click', () => {
  const newItem = {id:'i'+counter, name:'รายการใหม่', price:0, qty:0, side:'right', group:null, image:null};
  counter++;
  items.push(newItem);
  rightList.appendChild(cardTemplate(newItem));
  renderReceipt();
});

document.getElementById('clearBtn').addEventListener('click', () => {
  items.forEach(it => it.qty = 0);
  customerNameInput.value = '';
  renderAll();
});

customerNameInput.addEventListener('input', () => {
  renderReceipt();
  updateNamePlates();
});

document.getElementById('saveBtn').addEventListener('click', saveReceiptImage);

function loadImage(src){
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = () => resolve(null);
    img.src = src;
  });
}

function wrapTextLines(ctx, text, maxWidth){
  const words = text.split(' ');
  const lines = [];
  let current = '';
  const pieces = words.length > 1 ? words : Array.from(text);
  const sep = words.length > 1 ? ' ' : '';
  pieces.forEach(piece => {
    const test = current ? current + sep + piece : piece;
    if(ctx.measureText(test).width > maxWidth && current){
      lines.push(current);
      current = piece;
    } else {
      current = test;
    }
  });
  if(current) lines.push(current);
  return lines;
}

function truncateToWidth(ctx, text, maxWidth){
  if(ctx.measureText(text).width <= maxWidth) return text;
  let result = text;
  while(result.length > 1 && ctx.measureText(result + '…').width > maxWidth){
    result = result.slice(0, -1);
  }
  return result.length > 0 ? result + '…' : '…';
}

function fitNameLines(ctx, text, maxWidth, maxLines){
  const lines = wrapTextLines(ctx, text, maxWidth);
  if(lines.length <= maxLines) return lines;
  const kept = lines.slice(0, maxLines);
  kept[maxLines - 1] = truncateToWidth(ctx, kept[maxLines - 1], maxWidth);
  return kept;
}

function fillTextCentered(ctx, text, centerX, y){
  const w = ctx.measureText(text).width;
  ctx.textAlign = 'left';
  ctx.fillText(text, centerX - w / 2, y);
}

function drawRoundedRect(ctx, x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function buildLeftRows(leftItems){
  const medals = leftItems.filter(it => it.group === 'medal');
  const rows = [];
  let medalInserted = false;
  leftItems.forEach(it => {
    if(it.group === 'medal-top'){
      rows.push({type:'medal-top', item: it});
    } else if(it.group === 'medal'){
      if(!medalInserted){
        rows.push({type:'medal', items: medals});
        medalInserted = true;
      }
    } else {
      rows.push({type:'single', item: it});
    }
  });
  return rows;
}

async function saveReceiptImage(){
  const font = '"Segoe UI","Tahoma","Leelawadee UI","Noto Sans Thai",sans-serif';
  const nameVal = customerNameInput.value.trim() || '-';
  const selected = items.filter(it => it.qty > 0);
  const leftItems = selected.filter(it => it.side !== 'right');
  const rightItems = selected.filter(it => it.side === 'right');
  const leftRows = buildLeftRows(leftItems);

  const loadedImages = {};
  await Promise.all(selected.filter(it => it.image).map(async it => {
    loadedImages[it.id] = await loadImage(it.image);
  }));

  const scale = 2;
  const width = 640;
  const paddingX = 24;
  const colGap = 20;
  const colWidth = (width - paddingX * 2 - colGap) / 2;
  const cardH = 90;
  const cardGap = 16;
  const miniGap = 8;

  const rowCount = Math.max(leftRows.length, rightItems.length, 1);
  const gridTop = 128;
  const gridH = selected.length === 0 ? 30 : rowCount * cardH + (rowCount - 1) * cardGap;
  const height = gridTop + gridH + 130;

  const canvas = document.createElement('canvas');
  canvas.width = width * scale;
  canvas.height = height * scale;
  const ctx = canvas.getContext('2d');
  ctx.scale(scale, scale);

  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, width, height);
  ctx.strokeStyle = '#e0ddd6';
  ctx.lineWidth = 1;
  ctx.strokeRect(0.5, 0.5, width - 1, height - 1);

  ctx.fillStyle = '#2c2c2a';
  ctx.font = '600 20px ' + font;
  ctx.textAlign = 'left';
  ctx.fillText('ใบสั่งผลิต', paddingX, 42);

  const now = new Date();
  const dateStr = now.toLocaleDateString('th-TH', {year:'numeric', month:'short', day:'numeric'}) +
    ' ' + now.toLocaleTimeString('th-TH', {hour:'2-digit', minute:'2-digit'});
  ctx.font = '400 13px ' + font;
  ctx.fillStyle = '#6b6b66';
  ctx.fillText(dateStr, paddingX, 64);

  ctx.font = '500 15px ' + font;
  ctx.fillStyle = '#2c2c2a';
  ctx.fillText('ลูกค้า: ' + nameVal, paddingX, 90);

  ctx.strokeStyle = '#e0ddd6';
  ctx.beginPath();
  ctx.moveTo(paddingX, 108);
  ctx.lineTo(width - paddingX, 108);
  ctx.stroke();

  function drawCard(it, boxX, boxY, boxW, boxH, compact){
    const img = loadedImages[it.id];
    const label = it.nameTag ? nameVal : it.name;
    const priceLine = '×' + it.qty + '   ' + fmt(it.price * it.qty) + ' บาท';
    const maxTextW = boxW - 16;
    const nameSize = compact ? 11 : 13;
    const priceSize = compact ? 11 : 13;
    const lineH = nameSize + 4;
    const maxNameLines = 2;

    ctx.font = '600 ' + nameSize + 'px ' + font;
    const nameLines = fitNameLines(ctx, label, maxTextW, maxNameLines);
    ctx.font = '600 ' + priceSize + 'px ' + font;
    const priceLineFitted = truncateToWidth(ctx, priceLine, maxTextW);
    const textBlockH = (nameLines.length + 1) * lineH;

    ctx.save();
    drawRoundedRect(ctx, boxX, boxY, boxW, boxH, 8);
    ctx.clip();

    if(img){
      const coverScale = Math.max(boxW / img.width, boxH / img.height);
      const dw = img.width * coverScale, dh = img.height * coverScale;
      ctx.drawImage(img, boxX + (boxW - dw) / 2, boxY + (boxH - dh) / 2, dw, dh);
    } else {
      ctx.fillStyle = it.nameTag ? '#1c1c1c' : '#f7f5f2';
      ctx.fillRect(boxX, boxY, boxW, boxH);
    }

    if(img){
      ctx.font = '600 ' + priceSize + 'px ' + font;
      let maxTextWidth = ctx.measureText(priceLineFitted).width;
      ctx.font = '600 ' + nameSize + 'px ' + font;
      nameLines.forEach(l => { maxTextWidth = Math.max(maxTextWidth, ctx.measureText(l).width); });
      const scrimW = Math.min(boxW - 8, maxTextWidth + 16);
      const scrimH = textBlockH + 8;
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      drawRoundedRect(ctx, boxX + (boxW - scrimW) / 2, boxY + (boxH - scrimH) / 2, scrimW, scrimH, 6);
      ctx.fill();
    }

    ctx.fillStyle = img ? '#ffffff' : (it.nameTag ? '#f4f4f4' : '#2c2c2a');
    let textY = boxY + boxH / 2 - textBlockH / 2 + nameSize;
    ctx.font = '600 ' + nameSize + 'px ' + font;
    nameLines.forEach(line => {
      fillTextCentered(ctx, line, boxX + boxW / 2, textY);
      textY += lineH;
    });
    ctx.fillStyle = img ? '#ffffff' : (it.nameTag ? '#ff8a8a' : '#9c2b2b');
    ctx.font = '600 ' + priceSize + 'px ' + font;
    fillTextCentered(ctx, priceLineFitted, boxX + boxW / 2, textY);

    ctx.restore();

    ctx.strokeStyle = '#e0ddd6';
    ctx.lineWidth = 1;
    drawRoundedRect(ctx, boxX + 0.5, boxY + 0.5, boxW - 1, boxH - 1, 8);
    ctx.stroke();
  }

  if(selected.length === 0){
    ctx.font = '400 14px ' + font;
    ctx.fillStyle = '#9a9a94';
    ctx.textAlign = 'left';
    ctx.fillText('ยังไม่ได้เลือกสินค้า', paddingX, gridTop + 16);
  } else {
    const leftOffset = (rowCount - leftRows.length) * (cardH + cardGap);
    const rightOffset = (rowCount - rightItems.length) * (cardH + cardGap);
    leftRows.forEach((row, i) => {
      const yTop = gridTop + leftOffset + i * (cardH + cardGap);
      if(row.type === 'medal-top'){
        const miniW = (colWidth - 2 * miniGap) / 3;
        drawCard(row.item, paddingX + (miniW + miniGap), yTop, miniW, cardH, true);
      } else if(row.type === 'medal'){
        const miniW = (colWidth - (row.items.length - 1) * miniGap) / row.items.length;
        row.items.forEach((it, j) => {
          drawCard(it, paddingX + j * (miniW + miniGap), yTop, miniW, cardH, true);
        });
      } else {
        drawCard(row.item, paddingX, yTop, colWidth, cardH, false);
      }
    });
    rightItems.forEach((it, i) => drawCard(it, paddingX + colWidth + colGap, gridTop + rightOffset + i * (cardH + cardGap), colWidth, cardH, false));
  }

  let y = gridTop + gridH + 28;
  ctx.strokeStyle = '#e0ddd6';
  ctx.beginPath();
  ctx.moveTo(paddingX, y);
  ctx.lineTo(width - paddingX, y);
  ctx.stroke();
  y += 34;

  ctx.font = '600 15px ' + font;
  ctx.fillStyle = '#6b6b66';
  fillTextCentered(ctx, 'ยอดรวม', width / 2, y);
  y += 36;

  const totalText = fmt(computeTotal()) + ' บาท';
  const maxTotalW = width - paddingX * 2 - 20;
  let totalSize = 30;
  ctx.font = '700 ' + totalSize + 'px ' + font;
  while(ctx.measureText(totalText).width > maxTotalW && totalSize > 14){
    totalSize -= 1;
    ctx.font = '700 ' + totalSize + 'px ' + font;
  }
  ctx.fillStyle = '#9c2b2b';
  fillTextCentered(ctx, totalText, width / 2, y);
  ctx.textAlign = 'left';

  const filenameBase = customerNameInput.value.trim();
  canvas.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.download = (filenameBase ? filenameBase + '-' : '') + 'order.png';
    link.href = url;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }, 'image/png');
}

renderAll();
</script>
</body>
</html>
